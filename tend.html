<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tend</title>
<meta name="theme-color" content="#2A3658">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tend">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232A3658'/%3E%3Cpath d='M16 38 L32 20 L48 38' fill='none' stroke='%23ECEEEA' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round' stroke-dasharray='5 4'/%3E%3C/svg%3E">
<style>
  :root{
    --ground:#ECEEEA;
    --card:#FBFAF7;
    --ink:#23262B;
    --muted:#6B6F76;
    --indigo:#3A4B7A;
    --indigo-deep:#2A3658;
    --sage:#5F7257;
    --stitch:rgba(58,75,122,.38);
    --line:rgba(35,38,43,.10);
    --serif:Charter,'Iowan Old Style',Georgia,'Times New Roman',serif;
    --sans:-apple-system,'Segoe UI',system-ui,Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--ground);
    color:var(--ink);
    font-family:var(--sans);
    font-size:17px;
    line-height:1.5;
    display:flex;
    flex-direction:column;
    min-height:100%;
    min-height:100dvh;
  }
  .wrap{
    flex:1;
    width:100%;
    max-width:520px;
    margin:0 auto;
    padding:max(18px,env(safe-area-inset-top)) 20px 96px;
    display:flex;
    flex-direction:column;
  }
  header.top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{
    font-family:var(--serif);
    font-size:23px;
    letter-spacing:.01em;
  }
  .done{
    font-size:13px;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }

  /* time chips */
  .chips{display:flex;gap:8px;margin-bottom:20px;}
  .chip{
    flex:1;
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    font-family:var(--sans);
    font-size:13px;
    padding:8px 4px;
    border-radius:999px;
    cursor:pointer;
  }
  .chip[aria-pressed="true"]{
    background:var(--indigo-deep);
    border-color:var(--indigo-deep);
    color:var(--ground);
  }

  /* the one card */
  .card{
    background:var(--card);
    border-radius:18px;
    padding:26px 22px 22px;
    position:relative;
    box-shadow:0 1px 0 rgba(35,38,43,.04);
  }
  .card::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1.5px dashed var(--stitch);
    border-radius:12px;
    pointer-events:none;
  }
  .card .inner{position:relative;}
  .eyebrow{
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--indigo);
    margin-bottom:14px;
  }
  .unit-label{
    font-family:var(--serif);
    font-size:25px;
    line-height:1.25;
    margin:0 0 10px;
  }
  .unit-note{color:var(--muted);font-size:15px;margin:0 0 18px;}
  .meta-row{display:flex;gap:10px;align-items:center;margin-bottom:20px;}
  .tag{
    font-size:12px;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;
    padding:3px 8px;
  }
  .start{
    display:inline-block;
    background:var(--indigo-deep);
    color:var(--ground);
    text-decoration:none;
    text-align:center;
    font-family:var(--sans);
    font-size:16px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:11px;
    cursor:pointer;
    margin-bottom:14px;
  }
  .start.secondary{
    background:transparent;
    color:var(--indigo);
    border:1px solid var(--line);
  }
  .row2{display:flex;gap:10px;}
  .row2 .start{margin-bottom:0;}
  .row2 .did{background:var(--sage);}
  .row2 .skip{background:transparent;color:var(--muted);border:1px solid var(--line);}

  /* coach */
  .coach .eyebrow{color:var(--sage);}
  .coach-prompt{
    font-family:var(--serif);
    font-size:18px;
    line-height:1.4;
    background:rgba(95,114,87,.07);
    border-radius:10px;
    padding:14px 16px;
    margin:0 0 18px;
  }
  .caught{
    font-family:var(--serif);
    font-size:18px;
    line-height:1.4;
    color:var(--ink);
    background:rgba(58,75,122,.06);
    border-radius:10px;
    padding:14px 16px;
    margin:0 0 4px;
    word-break:break-word;
  }

  /* fill + dreams forms */
  h2.sec{font-family:var(--serif);font-size:20px;margin:2px 0 4px;}
  p.help{color:var(--muted);font-size:14px;margin:0 0 18px;}
  label.f{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;}
  input.f,textarea.f{
    width:100%;
    font-family:var(--sans);
    font-size:16px;
    color:var(--ink);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
  }
  textarea.f{min-height:70px;resize:vertical;}
  .seg{display:flex;gap:8px;margin-top:6px;}
  .seg button{
    flex:1;border:1px solid var(--line);background:transparent;
    color:var(--muted);font-family:var(--sans);font-size:13px;
    padding:9px 4px;border-radius:9px;cursor:pointer;
  }
  .seg button[aria-pressed="true"]{background:var(--indigo);border-color:var(--indigo);color:var(--ground);}
  button.add{
    margin-top:20px;width:100%;background:var(--indigo-deep);color:var(--ground);
    border:none;border-radius:11px;padding:14px;font-size:16px;font-family:var(--sans);cursor:pointer;
  }
  button.attach{
    margin-top:10px;width:100%;background:transparent;color:var(--indigo);
    border:1px solid var(--line);border-radius:11px;padding:13px;font-size:15px;
    font-family:var(--sans);cursor:pointer;
  }
  .shot{
    display:block;width:100%;max-height:240px;object-fit:cover;
    border-radius:10px;margin:0 0 12px;border:1px solid var(--line);
  }
  label.chk{
    display:flex;align-items:center;gap:8px;margin-top:12px;
    font-size:14px;color:var(--muted);cursor:pointer;
  }
  label.chk input{width:17px;height:17px;accent-color:var(--indigo);}

  .list{list-style:none;padding:0;margin:18px 0 0;}
  .list li{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;
  }
  .list li .txt{flex:1;font-size:15px;}
  .list li .sub{display:block;font-size:12px;color:var(--muted);margin-top:3px;}
  .list li .x{
    border:none;background:transparent;color:var(--muted);font-size:18px;
    cursor:pointer;line-height:1;padding:2px 4px;
  }

  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0;}

  .data-row{display:flex;gap:10px;margin-top:26px;padding-top:18px;border-top:1px solid var(--line);}
  .data-row button{
    flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);
    font-family:var(--sans);font-size:13px;padding:11px;border-radius:9px;cursor:pointer;
  }
  .stamp{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;}

  /* bottom nav */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--card);
    border-top:1px solid var(--line);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom);
    z-index:5;
  }
  nav.tabs button{
    flex:1;border:none;background:transparent;
    font-family:var(--sans);font-size:12px;color:var(--muted);
    padding:13px 4px 14px;cursor:pointer;
  }
  nav.tabs button[aria-pressed="true"]{color:var(--indigo-deep);font-weight:600;}
  nav.tabs .dot{display:block;font-size:17px;line-height:1;margin-bottom:3px;font-family:var(--serif);}

  .hidden{display:none;}
  :focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
  @media(prefers-reduced-motion:no-preference){
    .card,.list li{transition:opacity .18s ease;}
  }
  .toast{
    position:fixed;left:50%;bottom:84px;transform:translateX(-50%);
    background:var(--ink);color:var(--ground);font-size:13px;
    padding:9px 16px;border-radius:999px;opacity:0;pointer-events:none;
    transition:opacity .2s ease;z-index:9;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">Tend</div>
    <div class="done" id="doneCount"></div>
  </header>

  <!-- NOW -->
  <section id="view-now">
    <div class="chips" role="group" aria-label="How much time you have">
      <button class="chip" data-t="2" aria-pressed="false">A minute</button>
      <button class="chip" data-t="10" aria-pressed="true">A few</button>
      <button class="chip" data-t="999" aria-pressed="false">Longer</button>
    </div>
    <div id="nowSlot"></div>
  </section>

  <!-- CATCH -->
  <section id="view-catch" class="hidden">
    <h2 class="sec">Catch</h2>
    <p class="help">Dump it. Naming comes later, on Now.</p>
    <textarea class="f" id="cText" placeholder="Paste a link, a post, a thought \u2014 whatever you just glimpsed"></textarea>
    <button class="add" id="cAdd">Catch it</button>
    <button class="attach" id="cAttach">Attach screenshots</button>
    <input type="file" id="cFiles" accept="image/*" multiple class="hidden">
    <div class="stamp" id="queueStamp"></div>

    <div class="data-row">
      <button id="exportBtn">Export file</button>
      <button id="importBtn">Import file</button>
      <input type="file" id="importInput" accept="application/json" class="hidden">
    </div>
  </section>

  <!-- DREAMS -->
  <section id="view-dreams" class="hidden">
    <h2 class="sec">Dream catcher</h2>
    <p class="help">Anything you might make someday. No sorting. Just catch it before it floats off.</p>
    <textarea class="f" id="dText" placeholder="A future creation, half-formed and welcome"></textarea>
    <button class="add" id="dAdd">Catch it</button>
    <ul class="list" id="dList"></ul>
  </section>
</div>

<nav class="tabs" role="tablist">
  <button data-v="now" aria-pressed="true"><span class="dot">◇</span>Now</button>
  <button data-v="catch" aria-pressed="false"><span class="dot">+</span>Catch</button>
  <button data-v="dreams" aria-pressed="false"><span class="dot">∾</span>Dreams</button>
</nav>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------- storage (localStorage, wrapped so the Claude preview can't crash it) ---------- */
var KEY="tend.v1";
function blank(){return{queue:[],dreams:[],done:[],lastDone:null};}
function load(){
  try{var r=localStorage.getItem(KEY);return r?JSON.parse(r):blank();}
  catch(e){return window.__mem||blank();}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));}
  catch(e){window.__mem=state;} /* preview fallback: holds for the session only */
}
var state=load();
var timeFilter=10;

/* ---------- coach deck: pocket AI reps. Copy, paste into your Claude app. ---------- */
var DECK=[
  {title:"Name one repeat",prompt:"Interview me for five minutes about one task I keep redoing by hand, then write a one-paragraph job description for an AI agent that could own it: goal, what good looks like, what off-track looks like, when to escalate to me."},
  {title:"Sharpen a prompt",prompt:"Here's a prompt I use a lot: [paste it]. Ask me three questions about what I actually want, then rewrite it tighter and tell me what you changed and why."},
  {title:"Explain it back",prompt:"Explain how an AI agent harness differs from a single chat, in plain language, using one analogy from quilting or running an operations team. Keep it under 150 words."},
  {title:"Find the seam",prompt:"I want a personal AI system that reads a folder of files I drop in. Walk me through the simplest possible version I could stand up this week with what I already have, one step at a time, no jargon."},
  {title:"Turn junk into a unit",prompt:"I just glimpsed something that felt valuable but I can't tell if it's real signal. I'll describe it: [describe]. Help me decide if it's worth queuing, and if so, write it as one small completable action."},
  {title:"Draft a sub-agent",prompt:"Pretend you're helping me hire my first sub-agent. Pick one narrow job from my world, give it a name and a short charter, and tell me the first thing I'd watch to know it's working."}
];

/* ---------- helpers ---------- */
function el(id){return document.getElementById(id);}
function toast(m){var t=el("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1400);}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function todayKey(){return new Date().toISOString().slice(0,10);}
function doneToday(){return state.done.filter(function(d){return d.day===todayKey();}).length;}

/* ---------- NOW ---------- */
function pickUnit(){
  var fit=state.queue.filter(function(u){
    if(u.raw) return timeFilter<=10;      /* naming is quick work; not for a long sit */
    return u.mins<=timeFilter;
  });
  return fit.length?fit[0]:null;
}
function renderNow(){
  el("doneCount").textContent=doneToday()?doneToday()+" tended today":"";
  var slot=el("nowSlot");
  var u=pickUnit();
  if(u&&u.raw){renderNameCard(u);return;}
  if(u){
    var link=u.link
      ? '<a class="start" href="'+esc(u.link)+'" target="_blank" rel="noopener" id="startBtn">Start</a>'
      : '<button class="start" id="startBtn">Mark started</button>';
    slot.innerHTML=
      '<div class="card"><div class="inner">'
      +'<div class="eyebrow">One thing</div>'
      +(u.img?'<img class="shot" src="'+u.img+'" alt="">':'')
      +'<h1 class="unit-label">'+esc(u.label)+'</h1>'
      +(u.note?'<p class="unit-note">'+esc(u.note)+'</p>':'')
      +'<div class="meta-row"><span class="tag">'+timeWord(u.mins)+'</span><span class="tag">'+esc(u.source||"Idea")+'</span></div>'
      +link
      +'<div class="row2">'
      +'<button class="start did" id="didBtn">Did it</button>'
      +'<button class="start skip" id="skipBtn">Not now</button>'
      +'</div></div></div>';
    if(el("startBtn")&&el("startBtn").tagName==="BUTTON")el("startBtn").onclick=function(){toast("Started");};
    el("didBtn").onclick=function(){finishUnit(u.id);};
    el("skipBtn").onclick=function(){skipUnit(u.id);};
  } else {
    var c=DECK[Math.floor(Math.random()*DECK.length)];
    slot.innerHTML=
      '<div class="card coach"><div class="inner">'
      +'<div class="eyebrow">Queue\u2019s empty \u00b7 here\u2019s a rep</div>'
      +'<h1 class="unit-label">'+esc(c.title)+'</h1>'
      +'<p class="coach-prompt">'+esc(c.prompt)+'</p>'
      +'<button class="start" id="copyBtn">Copy prompt</button>'
      +'<button class="start secondary" id="anotherBtn">Show another</button>'
      +'</div></div>';
    el("copyBtn").onclick=function(){copyText(c.prompt);};
    el("anotherBtn").onclick=renderNow;
  }
}
function timeWord(m){return m<=2?"A minute":m<=10?"A few minutes":"Longer";}
function finishUnit(id){
  state.queue=state.queue.filter(function(u){return u.id!==id;});
  state.done.push({day:todayKey(),ts:Date.now()});
  save();renderNow();toast("Tended");
}
function skipUnit(id){
  var i=state.queue.findIndex(function(u){return u.id===id;});
  if(i>-1){var u=state.queue.splice(i,1)[0];state.queue.push(u);}
  save();renderNow();
}
function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){toast("Copied \u2014 paste into Claude");},function(){toast("Select and copy");});
  } else {toast("Select and copy");}
}

/* ---------- naming a caught thing (a unit in its own right) ---------- */
function renderNameCard(u){
  var slot=el("nowSlot");
  var looksLink=/^https?:\/\//i.test(u.text);
  slot.innerHTML=
    '<div class="card"><div class="inner">'
    +'<div class="eyebrow">Caught \u00b7 name it</div>'
    +(u.img?'<img class="shot" src="'+u.img+'" alt="caught screenshot">':'')
    +(u.img?'<button class="attach" id="nOcr" style="margin-top:0">Extract text</button>':'')
    +'<p class="caught">'+esc(u.text)+'</p>'
    +'<input class="f" id="nLabel" placeholder="Call it something you\u2019d reach for">'
    +'<div class="seg" id="nTime" role="group" style="margin-top:14px">'
      +'<button data-t="2" aria-pressed="false">A minute</button>'
      +'<button data-t="10" aria-pressed="true">A few</button>'
      +'<button data-t="999" aria-pressed="false">Longer</button>'
    +'</div>'
    +'<div class="seg" id="nSrc" role="group" style="margin-top:10px">'
      +'<button data-s="LinkedIn" aria-pressed="false">LinkedIn</button>'
      +'<button data-s="Email" aria-pressed="false">Email</button>'
      +'<button data-s="AI rep" aria-pressed="false">AI rep</button>'
      +'<button data-s="Idea" aria-pressed="true">Idea</button>'
    +'</div>'
    +'<input class="f" id="nLink" inputmode="url" placeholder="Lives at \u2014 OneDrive or web link (optional)" style="margin-top:10px">'
    +'<input class="f" id="nNote" placeholder="Note (optional)" style="margin-top:10px">'
    +(u.img?'<label class="chk"><input type="checkbox" id="nKeep" checked> Keep thumbnail</label>':'')
    +'<button class="start did" id="nSave" style="margin-top:16px">Name it</button>'
    +'<button class="start skip" id="nSkip">Not now</button>'
    +'</div></div>';
  var lab=el("nLabel");
  lab.value=looksLink?"":u.text.slice(0,80);
  if(looksLink)el("nLink").value=u.text;
  wireSeg("nTime");wireSeg("nSrc");
  if(u.img){
    el("nOcr").onclick=function(){runOcr(u,el("nOcr"));};
  }
  el("nSave").onclick=function(){
    u.label=lab.value.trim()||u.text.slice(0,80);
    u.note=el("nNote").value.trim();
    u.mins=parseInt(segVal("nTime").t||"10",10);
    u.source=segVal("nSrc").s||"Idea";
    u.link=el("nLink").value.trim();
    var keep=el("nKeep");
    if(u.img&&keep&&!keep.checked)u.img="";
    u.raw=false;
    save();renderNow();toast("Named \u2014 it\u2019s in the queue");
  };
  el("nSkip").onclick=function(){skipUnit(u.id);};
}

/* ---------- OCR (lazy, online only; the harness is the real home for this) ---------- */
function loadOcr(cb){
  if(window.Tesseract){cb(true);return;}
  if(!navigator.onLine){cb(false);return;}
  var s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
  s.onload=function(){cb(!!window.Tesseract);};
  s.onerror=function(){cb(false);};
  document.head.appendChild(s);
}
function runOcr(u,btn){
  if(!u.img){return;}
  btn.textContent="Loading reader\u2026";btn.disabled=true;
  loadOcr(function(ok){
    if(!ok){btn.textContent="Extract text";btn.disabled=false;toast("Needs a connection \u2014 or type it below");return;}
    btn.textContent="Reading\u2026";
    window.Tesseract.recognize(u.img,"eng").then(function(res){
      var txt=((res&&res.data&&res.data.text)||"").replace(/\s+\n/g,"\n").trim();
      if(!txt){btn.textContent="No text found";btn.disabled=false;toast("Couldn\u2019t find text");return;}
      el("nNote").value=txt;
      if(!el("nLabel").value.trim())el("nLabel").value=txt.split("\n")[0].slice(0,80);
      var keep=el("nKeep");if(keep)keep.checked=false;
      btn.textContent="Text extracted \u2713";
      toast("Text pulled in \u2014 image will drop on save");
    }).catch(function(){btn.textContent="Try again";btn.disabled=false;toast("Could not read it");});
  });
}
function segVal(id){var b=document.querySelector("#"+id+" [aria-pressed='true']");return b?b.dataset:{};}
function wireSeg(id){
  document.querySelectorAll("#"+id+" button").forEach(function(b){
    b.onclick=function(){
      document.querySelectorAll("#"+id+" button").forEach(function(x){x.setAttribute("aria-pressed","false");});
      b.setAttribute("aria-pressed","true");
    };
  });
}

/* ---------- chips ---------- */
Array.prototype.forEach.call(document.querySelectorAll(".chips .chip"),function(b){
  b.onclick=function(){
    document.querySelectorAll(".chips .chip").forEach(function(x){x.setAttribute("aria-pressed","false");});
    b.setAttribute("aria-pressed","true");
    timeFilter=parseInt(b.dataset.t,10);
    renderNow();
  };
});

/* ---------- CATCH ---------- */
el("cAdd").onclick=function(){
  var t=el("cText").value.trim();
  if(!t){el("cText").focus();return;}
  state.queue.push({id:newId(),text:t,raw:true,ts:Date.now()});
  save();
  el("cText").value="";el("cText").blur();
  renderQueueStamp();toast("Caught \u2014 name it later");
};
el("cAttach").onclick=function(){el("cFiles").click();};
el("cFiles").onchange=function(e){
  var files=Array.prototype.slice.call(e.target.files);
  if(!files.length)return;
  var left=files.length, made=0;
  files.forEach(function(f){
    fileToThumb(f,function(thumb){
      state.queue.push({id:newId(),text:f.name||"Screenshot",img:thumb||"",raw:true,ts:Date.now()});
      made++;
      if(--left===0){save();renderQueueStamp();toast(made+(made>1?" screenshots caught":" screenshot caught"));}
    });
  });
  e.target.value="";
};
function newId(){return Date.now()+""+Math.floor(Math.random()*999);}
function fileToThumb(file,cb){
  var r=new FileReader();
  r.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=700,w=img.width,h=img.height;
      if(w>=h&&w>max){h=Math.round(h*max/w);w=max;}
      else if(h>w&&h>max){w=Math.round(w*max/h);h=max;}
      try{
        var c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        cb(c.toDataURL("image/jpeg",0.7));
      }catch(err){cb("");}
    };
    img.onerror=function(){cb("");};
    img.src=r.result;
  };
  r.onerror=function(){cb("");};
  r.readAsDataURL(file);
}
function renderQueueStamp(){
  var raw=state.queue.filter(function(u){return u.raw;}).length;
  var named=state.queue.length-raw;
  var parts=[];
  if(raw)parts.push(raw+" caught, waiting to be named");
  if(named)parts.push(named+" named in the queue");
  el("queueStamp").textContent=parts.length?parts.join(" \u00b7 "):"Nothing caught yet";
}

/* ---------- DREAMS ---------- */
function renderDreams(){
  var ul=el("dList");
  if(!state.dreams.length){ul.innerHTML='<li class="empty">Nothing caught yet. The next idea goes here.</li>';return;}
  ul.innerHTML=state.dreams.slice().reverse().map(function(d){
    var when=new Date(d.ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
    return '<li><span class="txt">'+esc(d.text)+'<span class="sub">'+when+'</span></span>'
      +'<button class="x" data-id="'+d.id+'" aria-label="Remove">\u00d7</button></li>';
  }).join("");
  ul.querySelectorAll(".x").forEach(function(b){
    b.onclick=function(){
      state.dreams=state.dreams.filter(function(d){return d.id!=b.dataset.id;});
      save();renderDreams();
    };
  });
}
el("dAdd").onclick=function(){
  var t=el("dText").value.trim();
  if(!t)return;
  state.dreams.push({id:Date.now(),text:t,ts:Date.now()});
  save();el("dText").value="";renderDreams();toast("Caught");
};

/* ---------- export / import (the OneDrive seam + harness handoff) ---------- */
el("exportBtn").onclick=function(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tend-"+todayKey()+".json";
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},500);
  toast("Saved \u2014 drop it in OneDrive");
};
el("importBtn").onclick=function(){el("importInput").click();};
el("importInput").onchange=function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      state={queue:d.queue||[],dreams:d.dreams||[],done:d.done||[],lastDone:d.lastDone||null};
      save();renderAll();toast("Loaded");
    }catch(err){toast("That file wouldn't open");}
  };
  r.readAsText(f);
};

/* ---------- tabs ---------- */
function show(v){
  ["now","catch","dreams"].forEach(function(name){
    el("view-"+name).classList.toggle("hidden",name!==v);
  });
  document.querySelectorAll("nav.tabs button").forEach(function(b){
    b.setAttribute("aria-pressed",b.dataset.v===v?"true":"false");
  });
  if(v==="now")renderNow();
  if(v==="catch")renderQueueStamp();
  if(v==="dreams")renderDreams();
  window.scrollTo(0,0);
}
document.querySelectorAll("nav.tabs button").forEach(function(b){
  b.onclick=function(){show(b.dataset.v);};
});

/* ---------- boot ---------- */
function renderAll(){renderNow();renderQueueStamp();renderDreams();}
renderAll();
show("now");
</script>
</body>
</html>
